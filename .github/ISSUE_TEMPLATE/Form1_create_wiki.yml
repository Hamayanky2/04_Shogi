- type: markdown
  attributes:
    value: '戦型や戦法のwiki作成します。'

- type: dropdown
  id: AtkDef
  attributes:
    label: 攻守
    options:
    - 囲い
    - 攻め
    - 業
    default: 0
  validations:
    required: true
    
- type: dropdown
  id: offence_type
